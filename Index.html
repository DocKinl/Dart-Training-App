<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Scorer</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #e50914;
            --accent-hover: #b8070f;
            --border-color: #404040;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .settings-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            color: var(--text-color);
            border-color: var(--text-color);
        }

        /* Modal / Einstellungs-Popup */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open .modal {
            transform: translateY(0);
        }

        .modal h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* Spielanzeige */
        .score-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: center;
            margin-bottom: 25px;
        }

        .player-card {
            padding: 15px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .player-card.active {
            border-color: var(--accent-color);
            background-color: rgba(229, 9, 20, 0.05);
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player-score {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .player-stats {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Eingabe & Buttons */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .score-input-wrapper {
            display: flex;
            gap: 10px;
        }

        input#scoreInput {
            flex: 1;
            padding: 12px;
            font-size: 1.2rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-color);
            text-align: center;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: #4a4a4a;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #5a5a5a;
        }

        .btn-danger {
            background-color: #333333;
            color: #ff4444;
            border: 1px solid #551111;
        }

        .btn-danger:hover {
            background-color: #441111;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            flex: 1;
        }

        /* Kürzliche Würfe */
        .history-section {
            margin-top: 25px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .history-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .history-item {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
        }

        .history-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <h1>Dart Scorer</h1>
    <button class="settings-btn" id="openSettingsBtn">⚙ Spiel-Einstellungen</button>

    <div class="container">
        <!-- Scoreboard -->
        <div class="score-board">
            <div class="player-card active" id="cardP1">
                <div class="player-name" id="nameDisplayP1">Spieler 1</div>
                <div class="player-score" id="scoreP1">501</div>
                <div class="player-stats" id="statsP1">Aufnahmen: 0 (Ø 0.0)</div>
            </div>
            <div class="player-card" id="cardP2">
                <div class="player-name" id="nameDisplayP2">Spieler 2</div>
                <div class="player-score" id="scoreP2">501</div>
                <div class="player-stats" id="statsP2">Aufnahmen: 0 (Ø 0.0)</div>
            </div>
        </div>

        <!-- Eingabebereich -->
        <div class="input-section">
            <div class="score-input-wrapper">
                <input type="number" id="scoreInput" placeholder="Geworfene Punkte" min="0" max="180" inputmode="numeric">
                <button class="btn-primary" id="submitScoreBtn">Eintragen</button>
            </div>
            
            <div class="action-buttons">
                <button class="btn-secondary" id="undoBtn">↩ Wurf zurücksetzen</button>
                <button class="btn-danger" id="resetBtn">🔄 Match Neustart</button>
            </div>
        </div>

        <!-- Verlauf -->
        <div class="history-section">
            <div class="history-title">Letzte Aufnahmen:</div>
            <ul class="history-list" id="historyList">
                <!-- Dynamischer Inhalt via JS -->
            </ul>
        </div>
    </div>

    <!-- Einstellungs-Popup (Modal) -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>Spiel-Einstellungen</h2>
            
            <div class="form-group">
                <label for="inputP1">Name Spieler 1</label>
                <input type="text" id="inputP1" value="Spieler 1">
            </div>
            
            <div class="form-group">
                <label for="inputP2">Name Spieler 2</label>
                <input type="text" id="inputP2" value="Spieler 2">
            </div>
            
            <div class="form-group">
                <label for="gameMode">Spielmodus</label>
                <select id="gameMode">
                    <option value="501">501</option>
                    <option value="301">301</option>
                    <option value="701">701</option>
                </select>
            </div>

            <div class="modal-buttons">
                <button class="btn-secondary" id="closeSettingsBtn">Abbrechen</button>
                <button class="btn-primary" id="saveSettingsBtn">Speichern & Neustarten</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
