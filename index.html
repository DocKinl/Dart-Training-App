<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocKinl Dart Scorer</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #444444;
            --input-bg: #2a2a2a;
            --btn-opt-bg: #333333;
            --player-active-bg: #2a1616;
            --accent-color: #e50914;
            --accent-hover: #133e2b;
            --gold-text: #f3e5ab;
            --btn-num-bg: #2d2d2d;
            --btn-action-bg: #444444;
            --shortcut-bg: #25352e;
            --shortcut-text: #ffffff;
        }

        .light-theme {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
            --input-bg: #f0f0f0;
            --btn-opt-bg: #e0e0e0;
            --player-active-bg: #ffebee;
            --accent-color: #e50914;
            --accent-hover: #d00812;
            --gold-text: #b8860b;
            --btn-num-bg: #e0e0e0;
            --btn-action-bg: #bdbdbd;
            --shortcut-bg: #d1e7dd;
            --shortcut-text: #0f5132;
        }

        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); padding: 10px; margin: 0; transition: background 0.3s, color 0.3s; touch-action: manipulation; }
        .container { max-width: 600px; margin: 0 auto; position: relative; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--text-color); opacity: 0.8; }
        select { width: 100%; padding: 10px; background: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .btn-option { flex: 1; padding: 10px; background: var(--btn-opt-bg); border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer; border-radius: 4px; text-align: center; min-width: 70px; user-select: none; font-size: 14px; }
        .btn-option.active { background: var(--accent-color); border-color: #ff1e27; font-weight: bold; color: #fff; }
        .btn-main { width: 100%; padding: 14px; background: #0d2b1d; border: 1px solid #1b4d36; color: #fff; font-size: 16px; cursor: pointer; border-radius: 4px; font-weight: bold; text-align: center; }
        .btn-main:hover { background: var(--accent-hover); }
        .btn-abort { background: #444; border: 1px solid #555; margin-top: 10px; padding: 8px; font-size: 12px; }
        
        .settings-trigger { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; background: transparent; border: none; color: var(--text-color); opacity: 0.7; z-index: 10; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 100; padding: 10px; box-sizing: border-box; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px; border-radius: 8px; width: 90%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; background: transparent; border: none; color: var(--text-color); opacity: 0.7; }

        .game-layout { display: flex; gap: 10px; }
        .player-card { flex: 1; background: var(--input-bg); padding: 10px; border-radius: 6px; text-align: center; border: 2px solid transparent; }
        .player-card.active { border-color: var(--accent-color); background: var(--player-active-bg); }
        .score-display { font-size: 42px; font-weight: bold; margin: 5px 0; color: var(--gold-text); }
        .legs-sets-display { font-size: 13px; opacity: 0.8; margin-top: 4px; font-weight: bold; }
        .live-avg-display { font-size: 12px; color: var(--gold-text); opacity: 0.9; margin-top: 2px; font-style: italic; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 12px; }
        .history-table th, .history-table td { border-bottom: 1px solid var(--border-color); padding: 4px; text-align: center; }
        .history-table th { color: var(--text-color); opacity: 0.5; }
        .error-msg { color: var(--accent-color); font-weight: bold; text-align: center; margin: 5px 0; height: 22px; font-size: 16px; }

        .dart-live-preview { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; text-align: center; }
        .preview-box { background: var(--input-bg); padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); font-size: 14px; }
        .preview-box.active-slot { border-color: var(--gold-text); background: rgba(243, 229, 171, 0.1); }
        
        .keyboard-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 10px; }
        .keyboard-grid-sum { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .keyboard-grid-shortcuts { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
        
        .btn-key { background: var(--btn-num-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 12px 5px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; text-align: center; user-select: none; }
        .btn-key:active { opacity: 0.6; }
        .btn-key.modifier { background: var(--btn-action-bg); color: #fff; }
        .btn-key.modifier.active { background: var(--gold-text); color: #000; border-color: var(--gold-text); }
        .btn-key.action-clear { background: #555; color: #fff; }
        .btn-key.shortcut { background: var(--shortcut-bg); color: var(--shortcut-text); border-color: var(--border-color); font-size: 13px; padding: 8px 2px; }

        .sum-display-box { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; text-align: center; font-size: 28px; font-weight: bold; color: var(--gold-text); margin-bottom: 10px; min-height: 34px; }
        
        .stats-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
        .stats-table td, .stats-table th { padding: 8px; border: 1px solid var(--border-color); text-align: left; }
        .stats-table th { background: var(--input-bg); color: var(--gold-text); }
        .stats-table td:nth-child(2), .stats-table td:nth-child(3) { text-align: center; }

        /* NEU: Debug-Fehleranzeige Styles */
        #debug-error-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; box-sizing: border-box; }
        .debug-error-content { background: #2a1616; border: 3px solid #e50914; color: #ffffff; padding: 20px; border-radius: 8px; max-width: 500px; width: 100%; box-shadow: 0 0 20px rgba(229, 9, 20, 0.5); font-family: monospace; }
        .debug-error-title { color: #e50914; font-size: 18px; margin-top: 0; font-weight: bold; border-bottom: 1px solid #e50914; padding-bottom: 8px; }
        .debug-error-body { margin: 15px 0; white-space: pre-wrap; font-size: 14px; line-height: 1.4; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">

    <div id="startseite" class="card">
        <button class="settings-trigger btn-settings-open">⚙️</button>
        <h2 style="text-align: center; color: var(--accent-color); margin-top: 0; letter-spacing: 1px;">DocKinl Dart Scorer</h2>
        
        <div class="form-group">
            <label>Spielmodus</label>
            <div class="btn-group" id="group-game-mode">
                <div class="btn-option active" data-value="x01">X01</div>
                <div class="btn-option" data-value="fin">Finishing</div>
                <div class="btn-option" data-value="atc">ATC</div>
                <div class="btn-option" data-value="sod">Set of Darts</div>
            </div>
        </div>

        <div class="form-group" id="wrapper-players">
            <label>Gegner-Auswahl</label>
            <div class="btn-group" id="group-players">
                <div class="btn-option active" data-value="1">Solo</div>
                <div class="btn-option" data-value="bot">vs. Computer</div>
                <div class="btn-option" data-value="2">vs. Spieler 2</div>
            </div>
        </div>

        <div id="options-bot" class="hidden">
            <div class="form-group">
                <label>Computer Schwierigkeitsgrad</label>
                <div class="btn-group" id="group-bot-level">
                    <div class="btn-option active" data-value="easy">Anfänger</div>
                    <div class="btn-option" data-value="medium">Medium</div>
                    <div class="btn-option" data-value="strong">Strong</div>
                    <div class="btn-option" data-value="insane">Insane</div>
                </div>
            </div>
        </div>

        <div id="options-x01">
            <div class="form-group">
                <label id="points-slider-label">Startpunkte: 501</label>
                <input type="range" id="input-points-slider" min="101" max="501" step="100" value="501" style="width: 100%; accent-color: var(--accent-color);">
            </div>

            <div class="form-group" id="wrapper-legs-slider">
                <label id="legs-slider-label">Legs pro Set: Best of 5 (First to 3)</label>
                <input type="range" id="input-legs-slider" min="1" max="11" step="2" value="5" style="width: 100%; accent-color: var(--accent-color);">
            </div>
            
            <div class="form-group" id="wrapper-sets-slider">
                <label id="sets-slider-label">Sets zum Matchgewinn: Best of 1 (First to 1)</label>
                <input type="range" id="input-sets-slider" min="1" max="13" step="2" value="1" style="width: 100%; accent-color: var(--accent-color);">
            </div>

            <div class="form-group">
                <label>Eingabemodus</label>
                <div class="btn-group" id="group-input-mode">
                    <div class="btn-option active" data-value="segment">Darts einzeln</div>
                    <div class="btn-option" data-value="set">Aufnahme (Summe)</div>
                </div>
            </div>

            <div class="form-group">
                <label>Out-Modus</label>
                <div class="btn-group" id="group-out">
                    <div class="btn-option active" data-value="double">Double Out</div>
                    <div class="btn-option" data-value="single">Single Out</div>
                </div>
            </div>
        </div>
        
        <button id="btn-start-game" class="btn-main">Spiel starten</button>
        <button id="btn-open-stats" class="btn-main" style="background:#222; border-color:#333; margin-top:8px; font-size:14px; padding:10px;">📊 Statistiken</button>
    </div>
</div>

<div id="debug-error-overlay" class="hidden">
    <div class="debug-error-content">
        <div class="debug-error-title">🚨 JavaScript Fehler erkannt</div>
        <div class="debug-error-body" id="debug-error-text">Keine Details verfügbar.</div>
        <button class="btn-main" style="background:#555; border-color:#666;" onclick="document.getElementById('debug-error-overlay').classList.add('hidden')">Schließen</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
