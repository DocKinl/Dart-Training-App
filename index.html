<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocKinl Dart Scorer</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #444444;
            --input-bg: #2a2a2a;
            --btn-opt-bg: #333333;
            --player-active-bg: #2a1616;
            --accent-color: #e50914;
            --accent-hover: #133e2b;
            --gold-text: #f3e5ab;
            --btn-num-bg: #2d2d2d;
            --btn-action-bg: #444444;
            --shortcut-bg: #25352e;
            --shortcut-text: #ffffff;
        }

        .light-theme {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
            --input-bg: #f0f0f0;
            --btn-opt-bg: #e0e0e0;
            --player-active-bg: #fce8e8;
            --btn-num-bg: #e0e0e0;
            --btn-action-bg: #cccccc;
            --shortcut-bg: #d1e7dd;
            --shortcut-text: #0f5132;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            width: 100%;
            max-width: 600px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border-color);
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            box-sizing: border-box;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .page {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .hidden {
            display: none !important;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }

        .card-title {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
            color: var(--gold-text);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .option-label {
            font-size: 14px;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .btn-option {
            flex: 1;
            background-color: var(--btn-opt-bg);
            border: none;
            color: var(--text-color);
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-option.active {
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
            margin: 10px 0;
            accent-color: var(--accent-color);
        }

        .btn-main {
            background-color: #133e2b;
            border: 1px solid #195239;
            color: white;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-main:active {
            opacity: 0.8;
        }

        .match-header {
            text-align: center;
            font-size: 14px;
            color: var(--gold-text);
            margin-bottom: 5px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .scoreboard.two-players {
            grid-template-columns: 1fr 1fr;
        }

        .player-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            position: relative;
        }

        .player-card.active {
            background-color: var(--player-active-bg);
            border-color: var(--accent-color);
        }

        .player-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .player-score {
            font-size: 42px;
            font-weight: bold;
            margin: 5px 0;
            font-family: monospace;
        }

        .player-legs {
            font-size: 12px;
            opacity: 0.8;
        }

        .player-avg {
            font-size: 12px;
            color: var(--gold-text);
            margin-top: 2px;
        }

        .input-area {
            margin-top: 10px;
        }

        .preview-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .preview-box {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            min-height: 18px;
        }

        .preview-box.active-slot {
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(229, 9, 20, 0.5);
        }

        .multiplier-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-mult {
            background-color: var(--btn-opt-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-mult.active {
            background-color: #b68200;
            color: white;
            border-color: #d49b00;
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .numkey {
            background-color: var(--btn-num-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 0;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }

        .numkey:active {
            background-color: var(--accent-color);
            color: white;
        }

        .keyboard-grid-sum {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .sumkey {
            background-color: var(--btn-num-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 15px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }

        .sum-display-box {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: monospace;
        }

        .keyboard-grid-shortcuts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .shortcut {
            background-color: var(--shortcut-bg);
            border: 1px solid var(--border-color);
            color: var(--shortcut-text);
            padding: 8px 0;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }

        .error-msg {
            color: #ff4a4a;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            min-height: 18px;
            margin: 5px 0;
        }

        .history-section {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            flex: 1;
            overflow: hidden;
        }

        .history-section.two-panels {
            grid-template-columns: 1fr 1fr;
        }

        .history-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            max-height: 200px;
        }

        .history-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--gold-text);
            margin-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 3px;
        }

        .history-table-wrapper {
            flex: 1;
            overflow-y: auto;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            text-align: center;
        }

        .history-table th {
            position: sticky;
            top: 0;
            background-color: var(--card-bg);
            padding: 4px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        .history-table td {
            padding: 5px 4px;
            border-bottom: 1px dashed #333;
        }

        .light-theme .history-table td {
            border-bottom: 1px dashed #eee;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 20px;
            cursor: pointer;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: bold;
        }

        .form-group select {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .stats-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .stats-table td:last-child {
            text-align: right;
            font-weight: bold;
        }

        .victory-box {
            text-align: center;
            padding: 20px 10px;
        }

        .victory-title {
            font-size: 24px;
            color: #ffc107;
            margin-bottom: 20px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }

        .summary-table th {
            padding: 8px;
            border-bottom: 2px solid var(--border-color);
        }

        .summary-table td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .summary-table td:first-child {
            text-align: left;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="header-title">🎯 DocKinl Dart Scorer</h1>
        <div class="header-buttons">
            <button class="btn-icon" id="btn-open-stats">📊</button>
            <button class="btn-icon btn-settings-open">⚙️</button>
        </div>
    </header>

    <div class="container">
        <div id="startseite" class="page">
            <div class="card">
                <h2 class="card-title">Spielmodus wählen</h2>
                <div class="btn-group" id="group-game-mode">
                    <button class="btn-option active" data-value="x01">X01</button>
                    <button class="btn-option" data-value="fin">Finishing</button>
                    <button class="btn-option" data-value="atc">ATC</button>
                    <button class="btn-option" data-value="sod">Set of Darts</button>
                </div>
            </div>

            <div id="options-x01" class="card options-grid">
                <div class="slider-container">
                    <div class="slider-header">
                        <span id="points-slider-label">Startpunkte: 501</span>
                    </div>
                    <input type="range" id="input-points-slider" min="101" max="1001" step="100" value="501">
                </div>

                <div class="slider-container">
                    <div class="slider-header">
                        <span id="legs-slider-label">Legs pro Set: Best of 5</span>
                    </div>
                    <input type="range" id="input-legs-slider" min="1" max="11" step="2" value="5">
                </div>

                <div class="slider-container">
                    <div class="slider-header">
                        <span id="sets-slider-label">Sets zum Matchgewinn: Best of 1</span>
                    </div>
                    <input type="range" id="input-sets-slider" min="1" max="9" step="2" value="1">
                </div>

                <div class="option-group">
                    <span class="option-label">Eingabemodus:</span>
                    <div class="btn-group" id="group-input-mode">
                        <button class="btn-option active" data-value="segment">Dart-für-Dart</button>
                        <button class="btn-option" data-value="set">Gesamtsumme</button>
                    </div>
                </div>

                <div class="option-group">
                    <span class="option-label">Auschecken per:</span>
                    <div class="btn-group" id="group-out">
                        <button class="btn-option" data-value="single">Single Out</button>
                        <button class="btn-option active" data-value="double">Double Out</button>
                    </div>
                </div>
            </div>

            <div id="options-fin" class="card options-grid hidden">
                <div class="option-group">
                    <span class="option-label">Modus-Typ:</span>
                    <div class="btn-group" id="group-fin-type">
                        <button class="btn-option active" data-value="realistic">Realistisches Spiel</button>
                        <button class="btn-option" data-value="strict">Exakter Checkout-Wurf</button>
                    </div>
                </div>
                <div class="option-group" id="wrapper-fin-range">
                    <span class="option-label">Ziele-Bereich:</span>
                    <div class="btn-group" id="group-fin-range">
                        <button class="btn-option active" data-value="low">2 - 40 (Low)</button>
                        <button class="btn-option" data-value="mid">2 - 80 (Mid)</button>
                        <button class="btn-option" data-value="high">2 - 170 (High)</button>
                    </div>
                </div>
            </div>

            <div id="options-atc" class="card options-grid hidden">
                <div class="option-group">
                    <span class="option-label">Wertung bei Doppel / Triple Treffern:</span>
                    <div class="btn-group" id="group-atc-bonus">
                        <button class="btn-option active" data-value="standard">Einfacher Schritt (+1)</button>
                        <button class="btn-option" data-value="bonus">Bonus-Schritte (+2 / +3)</button>
                    </div>
                </div>
            </div>

            <div id="options-sod" class="card options-grid hidden">
                <div class="option-group">
                    <span class="option-label">Anzahl Trainingspfeile:</span>
                    <div class="btn-group" id="group-sod-darts">
                        <button class="btn-option" data-value="30">30 Darts</button>
                        <button class="btn-option active" data-value="60">60 Darts</button>
                        <button class="btn-option" data-value="99">99 Darts</button>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="sod-target-select">Zielsegment:</label>
                    <select id="sod-target-select"></select>
                </div>
                <div class="option-group">
                    <span class="option-label">Zielring:</span>
                    <div class="btn-group" id="group-sod-ring">
                        <button class="btn-option active" data-value="single">Single-Feld</button>
                        <button class="btn-option" data-value="double">Doppel-Ring</button>
                        <button class="btn-option" data-value="treble">Triple-Ring</button>
                    </div>
                </div>
            </div>

            <div class="card" id="wrapper-players">
                <h2 class="card-title">Gegner</h2>
                <div class="btn-group" id="group-players">
                    <button class="btn-option active" data-value="1">Solo-Training</button>
                    <button class="btn-option" data-value="2">2 Spieler</button>
                    <button class="btn-option" data-value="bot">Computer-Gegner</button>
                </div>
            </div>

            <div id="options-bot" class="card hidden">
                <h2 class="card-title">Computer Stärke</h2>
                <div class="btn-group" id="group-bot-level">
                    <button class="btn-option" data-value="easy">Einfach (Ø ~35)</button>
                    <button class="btn-option active" data-value="medium">Mittel (Ø ~52)</button>
                    <button class="btn-option" data-value="strong">Stark (Ø ~78)</button>
                    <button class="btn-option" data-value="insane">Profi (Ø ~102)</button>
                </div>
            </div>

            <button class="btn-main" id="btn-start-game" style="margin-top: 5px;">SPIEL STARTEN</button>
